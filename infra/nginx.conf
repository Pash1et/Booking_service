user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { 
    worker_connections  1024;
}

http {
    server {
        listen 80;
        server_name localhost;
        location / {
            proxy_pass http://backend:8000/;
        }
        location /flower {
            proxy_pass http://flower:5555/flower;
        }
    }
}