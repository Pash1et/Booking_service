version: '3.8'
services:

  postgresql:
    container_name: db
    image: postgres:15.0-alpine
    volumes:
      - dbdata:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}

  backend:
    container_name: app
    build: 
      context: .
    restart: on-failure
    entrypoint: ["sh", "infra/run.sh"]
    depends_on:
      - postgresql
    env_file:
      - .env

  redis:
    container_name: redis
    image: redis:6.2-alpine
    restart: on-failure

  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - 80:80

volumes:
  dbdata:
